<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cafeteria</title>
  <link rel="stylesheet" href="login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="Imagenes/Icono.png" type="image/png">
</head>
<body>
  
  <header class="navbar">
    <div class="logo">
     <img src="Imagenes/R.jpg" alt="Logo de la Cafetería" class="navbar-logo-img"/>RUBÉN</div>
    <nav>
      <a href="#">Inicio</a>
      <a href="#">Acerca</a>
      <a href="#">Servicios</a>
      <a href="#">Contacto</a>
    </nav>
    <button id="showLogin">Login</button>
  </header>

  <div class="login-box" id="loginBox">
    <span class="close-btn" id="closeLogin">✕</span>
    <h2>Login</h2>
    <form id="loginForm">
  <label>Email</label>
  <div class="input-group">
    <input type="email" placeholder="Email" required id="emailInput" />
    <span class="icon">📧</span>
  </div>

  <label>Password</label>
  <div class="input-group">
    <input type="password" placeholder="Password" required id="passwordInput" />
    <span class="icon">🔒</span>
  </div>

  <div class="options">
    <label><input type="checkbox" /> Remember me</label>
    <a href="#">Forgot Password?</a>
  </div>

  <button type="submit">Login</button>
  <p>Don't have an account? <a href="#">Register</a></p>
</form>

  </div>

  <script>
    const btnShow = document.getElementById("showLogin");
    const loginBox = document.getElementById("loginBox");
    const closeBtn = document.getElementById("closeLogin");

    btnShow.onclick = () => loginBox.classList.add("show");
    closeBtn.onclick = () => loginBox.classList.remove("show");
  </script>

</body>

<script src="login.js"></script>

</html>
